<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Frame6 Coding Ver</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #f5f5f3;
}
.canvas {
  position: relative;
  width: 1920px;
  margin: 0 auto;
}
.bg-image {
  display: block;
  width: 1920px;
}
.app-iframe {
  position: absolute;
  left: 765px;
  top: 126px;
  width: 390px;
  height: 844px;
  border: none;
  border-radius: 36px;
  overflow: hidden;
  box-shadow: 0 0 0 1px rgba(0,0,0,0.04), 0 30px 60px -10px rgba(0,0,0,0.15);
  z-index: 1;
}
</style>
</head>
<body>
<div class="canvas">
  <img class="bg-image" src="bg_image.png" alt="Background">
  <iframe class="app-iframe" src="index.html" scrolling="yes"></iframe>
</div>
</body>
</html>
